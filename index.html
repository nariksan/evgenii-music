<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVGENII — Music</title>
    <style>
        /* === СТИЛИ (Дизайн) === */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        
        body {
            background-color: #0a0a0f;
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h1 { text-align: center; margin-bottom: 40px; font-weight: 700; letter-spacing: 2px; }
        .accent { color: #ff2d75; }

        /* Карточка трека */
        .track-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }
        .track-card:hover { background: rgba(255, 255, 255, 0.1); }

        /* Кнопка Play */
        .play-btn {
            width: 50px; height: 50px;
            background: #ff2d75;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .play-btn.playing { background: #00d4ff; }

        .info { flex-grow: 1; }
        .title { font-weight: bold; font-size: 1.1rem; display: block; }
        .desc { font-size: 0.8rem; color: #aaa; margin-top: 5px; display: block; }
        
        .duration { font-family: monospace; color: #888; }
    </style>
</head>
<body>

    <div class="container">
        <h1>EVGENII <span class="accent">MUSIC</span></h1>
        
        <!-- Сюда скрипт добавит треки -->
        <div id="playlist"></div>
    </div>

    <script>
        // ==========================================
        // 🎵 СПИСОК ТРЕКОВ (РЕДАКТИРУЙ ТОЛЬКО ЭТОТ БЛОК)
        // ==========================================
        const tracks = [
            {
                title: "Моя Песня",       // Название
                desc: "Свежий релиз",     // Описание
                file: "tracks/song.mp3",  // Путь к файлу (папка/файл.mp3)
                duration: "3:00"          // Время (просто текст)
            },
            {
                title: "Цифровые Сны",
                desc: "О чём думает ИИ?",
                file: "tracks/dreams.mp3", // Пример другого файла
                duration: "3:42"
            }
            // Чтобы добавить еще трек, скопируй блок {...}, поставь запятую и вставь ниже
        ];

        // ==========================================
        // ЛОГИКА ПЛЕЕРА (НЕ ТРОГАЙ)
        // ==========================================
        const playlist = document.getElementById('playlist');
        let currentAudio = null;
        let currentBtn = null;

        tracks.forEach((track, index) => {
            // Создаем HTML для каждого трека
            const card = document.createElement('div');
            card.className = 'track-card';
            
            card.innerHTML = `
                <button class="play-btn" onclick="togglePlay(${index}, this)">▶</button>
                <div class="info">
                    <span class="title">${track.title}</span>
                    <span class="desc">${track.desc}</span>
                </div>
                <div class="duration">${track.duration}</div>
            `;
            
            playlist.appendChild(card);
        });

        function togglePlay(index, btn) {
            const track = tracks[index];
            
            // Если нажали на тот же трек, который играет
            if (currentAudio && currentBtn === btn) {
                if (currentAudio.paused) {
                    currentAudio.play();
                    btn.innerHTML = "❚"; // Пауза
                    btn.classList.add('playing');
                } else {
                    currentAudio.pause();
                    btn.innerHTML = "▶"; // Плей
                    btn.classList.remove('playing');
                }
                return;
            }

            // Если нажали на новый трек
            if (currentAudio) {
                currentAudio.pause();
                currentBtn.innerHTML = "▶";
                currentBtn.classList.remove('playing');
            }

            currentAudio = new Audio(track.file);
            currentBtn = btn;
            
            currentAudio.play();
            btn.innerHTML = "❚";
            btn.classList.add('playing');

            // Когда трек закончится
            currentAudio.onended = () => {
                btn.innerHTML = "▶";
                btn.classList.remove('playing');
            };
        }
    </script>
</body>
</html>
