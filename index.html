<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVGENII — Music</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="./icon.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --neon-pink: #ff2d75;
            --neon-blue: #00d4ff;
            --dark-bg: #0a0a0f;
            --card-bg: rgba(20, 20, 30, 0.6);
            --text-primary: #e8e8f0;
            --text-secondary: #8888aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark-bg); color: var(--text-primary); overflow-x: hidden; }

        /* === BACKGROUND === */
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden; }
        .bg-animation .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.35; animation: floatOrb 25s ease-in-out infinite; }
        .orb:nth-child(1) { width: 50vw; height: 50vw; background: var(--neon-pink); top: -10%; left: -10%; }
        .orb:nth-child(2) { width: 40vw; height: 40vw; background: var(--neon-blue); bottom: -10%; right: -10%; animation-delay: -5s; }
        .orb:nth-child(3) { width: 30vw; height: 30vw; background: #b537f2; top: 40%; left: 40%; animation-delay: -10s; }
        @keyframes floatOrb { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(30px, -30px); } }

        .container { position: relative; z-index: 2; max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        section { padding: 100px 0; scroll-margin-top: 80px; }

        /* === NAV === */
        nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 100; padding: 20px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); background: rgba(10, 10, 15, 0.8); border-bottom: 1px solid rgba(255,255,255,0.05); height: 70px; }
        .logo { font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: 2px; font-size: 1.2rem; cursor: pointer; }
        .logo span { color: var(--neon-pink); }
        .nav-links a { color: var(--text-secondary); text-decoration: none; margin-left: 20px; font-size: 0.9rem; transition: 0.3s; cursor: pointer; }
        .nav-links a:hover { color: white; }

        /* === HERO === */
        .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding-top: 80px; }
        .hero h1 { font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 800; line-height: 1.1; margin-bottom: 20px; }
        .gradient-text { background: linear-gradient(135deg, #fff, var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { font-size: 1.2rem; color: var(--text-secondary); max-width: 600px; margin: 0 auto; line-height: 1.6; }
        
        .action-zone { display: flex; gap: 20px; margin-top: 40px; flex-wrap: wrap; justify-content: center; }
        .cyber-btn { padding: 15px 30px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; text-decoration: none; font-weight: 700; border-radius: 8px; transition: 0.3s; cursor: pointer; }
        .cyber-btn:hover { background: var(--neon-pink); border-color: var(--neon-pink); transform: translateY(-2px); }

        /* === SECTIONS === */
        .section-header { margin-bottom: 40px; border-left: 4px solid var(--neon-pink); padding-left: 20px; }
        .section-tag { font-family: 'JetBrains Mono', monospace; color: var(--neon-pink); font-size: 0.8rem; margin-bottom: 5px; }
        .section-title { font-size: 2rem; font-weight: 700; }

        /* === TRACK CARDS === */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        .track-card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px;
            padding: 20px; display: flex; align-items: center; gap: 20px; transition: 0.3s;
        }
        .track-card:hover { border-color: var(--neon-blue); transform: translateY(-3px); }

        .play-btn {
            width: 50px; height: 50px; border-radius: 50%; background: var(--text-primary); color: var(--dark-bg);
            border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: 0.2s;
        }
        .play-btn:hover { background: var(--neon-blue); transform: scale(1.1); }
        .play-btn svg { width: 20px; fill: currentColor; margin-left: 2px; }
        .play-btn.active { background: var(--neon-pink); color: white; }
        .play-btn.active svg { margin-left: 0; } /* Fix for pause icon alignment */

        .track-info h3 { font-size: 1.1rem; margin-bottom: 5px; }
        .track-info p { font-size: 0.85rem; color: var(--text-secondary); }
        .track-duration { font-family: 'JetBrains Mono'; font-size: 0.8rem; color: var(--text-secondary); margin-left: auto; }

        /* === SOCIAL BUTTONS === */
        .social-section { text-align: center; padding: 80px 0; }
        .social-btns { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 30px; }
        .s-btn { padding: 15px 30px; border-radius: 50px; text-decoration: none; color: white; font-weight: bold; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .tg { background: #24A1DE; }
        .insta { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .s-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        footer { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="bg-animation"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

    <nav>
        <div class="logo" onclick="window.scrollTo(0,0)">EVGENII<span>.</span></div>
        <div class="nav-links">
            <a onclick="scrollToId('new')">Релизы</a>
            <a onclick="scrollToId('archive')">Архив</a>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <h1><span class="gradient-text">Где заканчиваюсь я —<br>и начинается ИИ.</span></h1>
            <p>Мои тексты, озвученные искусственным разумом.</p>
            <div class="action-zone">
                <div class="cyber-btn" onclick="scrollToId('new')">Слушать</div>
            </div>
        </div>
    </section>

    <section id="new">
        <div class="container">
            <div class="section-header">
                <div class="section-tag">// NEW</div>
                <div class="section-title">Новые релизы</div>
            </div>
            <div class="grid" id="releasesList"></div>
        </div>
    </section>

    <section id="archive">
        <div class="container">
            <div class="section-header">
                <div class="section-tag">// ARCHIVE</div>
                <div class="section-title">Все треки</div>
            </div>
            <div class="grid" id="archiveList"></div>
        </div>
    </section>

    <section class="social-section">
        <div class="container">
            <div class="section-header" style="border-left-color: #24A1DE;">
                <div class="section-tag" style="color: #24A1DE;">// CONNECT</div>
                <div class="section-title">Связь</div>
            </div>
            <div class="social-btns">
                <a href="https://t.me/+zo3YoDDckwoyOGYy" target="_blank" class="s-btn tg">Telegram Chat</a>
                <a href="https://www.instagram.com/zhenyaa0?igsh=ZHV4ZHE1MGQwd3N5&utm_source=qr" target="_blank" class="s-btn insta">Instagram</a>
            </div>
        </div>
    </section>

    <footer>© 2026 EVGENII. Human & AI.</footer>

    <script>
        // ==========================================
        // 🎵 СПИСОК ТРЕКОВ (МЕНЯЙ ТОЛЬКО ЭТО)
        // ==========================================
        const tracks = [
            // НОВЫЕ РЕЛИЗЫ (isNew: true)
            {
                id: 1,
                title: "Цифровые Сны",
                desc: "О чём думает нейросеть?",
                file: "tracks/song.mp3", // Путь к твоему файлу
                duration: "3:42",
                isNew: true
            },
            {
                id: 2,
                title: "Последний Закат",
                desc: "Когда небо горит",
                file: "tracks/song2.mp3",
                duration: "4:15",
                isNew: true
            },
            
            // АРХИВ (isNew: false)
            {
                id: 3,
                title: "Код Любви",
                desc: "if (love) return forever",
                file: "tracks/song3.mp3",
                duration: "3:28",
                isNew: false
            }
        ];

        // ==========================================
        // ЛОГИКА (НЕ ТРОГАЙ)
        // ==========================================
        let currentAudio = null;
        let currentBtn = null;

        function renderTracks() {
            const newContainer = document.getElementById('releasesList');
            const archContainer = document.getElementById('archiveList');

            tracks.forEach(track => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.innerHTML = `
                    <button class="play-btn" onclick="togglePlay('${track.file}', this)">
                        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                    </button>
                    <div class="track-info">
                        <h3>${track.title}</h3>
                        <p>${track.desc}</p>
                    </div>
                    <div class="track-duration">${track.duration}</div>
                `;

                if (track.isNew) newContainer.appendChild(card);
                else archContainer.appendChild(card);
            });
        }

        function togglePlay(file, btn) {
            // Если нажали на тот же трек
            if (currentBtn === btn) {
                if (currentAudio.paused) {
                    currentAudio.play();
                    btn.classList.add('active');
                    btn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
                } else {
                    currentAudio.pause();
                    btn.classList.remove('active');
                    btn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>';
                }
                return;
            }

            // Если нажали на новый трек
            if (currentAudio) {
                currentAudio.pause();
                if(currentBtn) {
                    currentBtn.classList.remove('active');
                    currentBtn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>';
                }
            }

            currentAudio = new Audio(file);
            currentBtn = btn;
            
            currentAudio.play();
            btn.classList.add('active');
            btn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';

            currentAudio.onended = () => {
                btn.classList.remove('active');
                btn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>';
            };
        }

        function scrollToId(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        // PWA Register
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
        }

        document.addEventListener('DOMContentLoaded', renderTracks);
    </script>
</body>
</html>
